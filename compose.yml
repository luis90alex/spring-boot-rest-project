  prometheus:
    # version used in 31/12/2025
    image: prom/prometheus:v3.8.1
    # Skipped container_name to allow using docker swam in the future
    # Optional command to indicate prometheus where is the config file that it should use
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      # bind mount ro = read only prometheus config and alerts files
      - ./docker-config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker-config/prometheus/alerts:/etc/prometheus/alerts:ro
    ports:
      - "9090:9090"
    depends_on:
      - alertmanager
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
  grafana:
    # Stable version on 31/12/2025
    image: grafana/grafana:12.3
    # Skipped container_name to allow using docker swam in the future
    # container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # admin password, used it here to skip password change request
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Automatic datasource Provisioning (Prometheus)
      - ./docker-config/grafana/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      # Automatic dashboards Provisioning
      #- ./docker-config/grafana/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      # JSON dashboards folder (read only)
      #- ./docker-config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      # Persistent volume for grafana dara (users, alerts, manual dashboards)
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/healthz" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  # Alert manager to send alerts notifications
  alertmanager:
    image: prom/alertmanager:v0.30.0
    # Commands to use alertmanaaer.yml as a config
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    volumes:
      - ./docker-config/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "9093:9093"
  redis:
    image: redis:8.2-alpine
    command: redis-server --requirepass password
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "password", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
  kafka:
    # Kafka with Kraft (no zookeeper necessary)
    image: confluentinc/cp-kafka:7.8.3
    #hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: 'true' # Variable to enable kraft mode
      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo' # Unique identifier of the cluster. UUID in base64
      KAFKA_NODE_ID: 1 # Numerical id of the node inside the cluster. We have only one broker
      KAFKA_PROCESS_ROLES: broker,controller # Configuration to set the node as a broker and as a controller
      #Property that defines which brokers are controllers and can vote on important cluster decisions
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093 # Format used = nodeId@host:port
      # Number of copies of kafka metadata that keeps track of which msg are read by consumers
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Specifies the network interfaces and ports on which the broker listens for incoming connections
      # Three doors (endpoints) are opened. 1 for regular data traffic on port 9092 using plaintext protocol
      # Another endpoint is used for controller communication in port 9093. Node to node management config
      # Another for metrics with kafdrop
      # Format <LISTENER_NAME>://<bind_address>:<port>
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,INTERNAL://0.0.0.0:29092
      # Defines the addresses that kafka tells clients/brokers to connect to
      # IMPORTANT:
      # - Spring Boot inside Docker → kafka:9092
      # - Spring Boot running locally → localhost:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      # Every listener has a protocol. Here it's defined
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      # The same but with controllers. CONTROLLER is the name of the listeners. It's used a shortcut for real url
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Directory where kafka stores data files, broker logs, controller metadata...
      KAFKA_LOG_DIR: /tmp/kraft-combined-logs
    volumes:
      - kafka-kraft:/var/lib/kafka/data
  kafdrop:
    image: obsidiandynamics/kafdrop:4.2.0
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
# List of used volumes
volumes:
  #mysql-volume:
  grafana-data:
  redis-data:
  kafka-kraft: